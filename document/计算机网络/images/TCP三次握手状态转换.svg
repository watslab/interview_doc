<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f6f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0e9f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9f0f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateClosed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#607d8b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateListen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateSyn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateEstab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000025"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arrowSolid" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455a64"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrowTimeout" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e53935"/>
    </marker>
  </defs>
  
  <rect width="1000" height="680" fill="url(#bgGrad)"/>
  
  <rect x="30" y="60" width="400" height="540" rx="15" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <rect x="570" y="60" width="400" height="540" rx="15" fill="url(#serverGrad)" filter="url(#shadow)"/>
  
  <text x="230" y="38" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0">客户端状态</text>
  <text x="770" y="38" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#7b1fa2">服务器状态</text>
  
  <g id="client-states">
    <rect x="165" y="100" width="130" height="50" rx="10" fill="url(#stateClosed)" filter="url(#shadowLight)"/>
    <text x="230" y="132" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">CLOSED</text>
    
    <rect x="165" y="250" width="130" height="50" rx="10" fill="url(#stateSyn)" filter="url(#shadowLight)"/>
    <text x="230" y="282" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">SYN_SENT</text>
    
    <rect x="165" y="480" width="130" height="50" rx="10" fill="url(#stateEstab)" filter="url(#shadowLight)"/>
    <text x="230" y="512" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">ESTABLISHED</text>
  </g>
  
  <g id="server-states">
    <rect x="705" y="100" width="130" height="50" rx="10" fill="url(#stateClosed)" filter="url(#shadowLight)"/>
    <text x="770" y="132" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">CLOSED</text>
    
    <rect x="705" y="210" width="130" height="50" rx="10" fill="url(#stateListen)" filter="url(#shadowLight)"/>
    <text x="770" y="242" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">LISTEN</text>
    
    <rect x="705" y="360" width="130" height="50" rx="10" fill="url(#stateSyn)" filter="url(#shadowLight)"/>
    <text x="770" y="392" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">SYN_RCVD</text>
    
    <rect x="705" y="520" width="130" height="50" rx="10" fill="url(#stateEstab)" filter="url(#shadowLight)"/>
    <text x="770" y="552" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="white">ESTABLISHED</text>
  </g>
  
  <g id="client-transitions" fill="none" stroke-width="2.5">
    <path d="M230,150 L230,245" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">主动打开</text>
    <text x="245" y="212" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">发送 SYN</text>
    
    <path d="M230,300 L230,475" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="382" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">收到 SYN+ACK</text>
    <text x="245" y="399" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">发送 ACK</text>
    
    <path d="M165,275 Q60,275 60,185 Q60,125 165,125" stroke="#e53935" stroke-dasharray="6,3" marker-end="url(#arrowTimeout)"/>
    <text x="70" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#c62828">超时/关闭</text>
  </g>
  
  <g id="server-transitions" fill="none" stroke-width="2.5">
    <path d="M770,150 L770,205" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">被动打开</text>
    <text x="785" y="190" font-family="Consolas, monospace" font-size="11" fill="#37474f">listen()</text>
    
    <path d="M770,260 L770,355" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">收到 SYN</text>
    <text x="785" y="317" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">发送 SYN+ACK</text>
    
    <path d="M770,410 L770,515" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">收到 ACK</text>
    
    <path d="M705,385 C570,350 570,150 705,125" stroke="#e53935" stroke-dasharray="6,3" marker-end="url(#arrowTimeout)"/>
    <text x="614" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#c62828">超时/关闭</text>
    
    <path d="M705,235 C620,235 620,150 705,125" stroke="#e53935" stroke-dasharray="6,3" marker-end="url(#arrowTimeout)"/>
    <text x="650" y="185" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#c62828">关闭</text>
  </g>
  
  <g id="interactions" fill="none" stroke-width="2.5" stroke="#7c4dff" stroke-dasharray="8,4">
    <path d="M295,275 L705,385" marker-end="url(#arrowDashed)"/>
    <path d="M705,385 L295,505" marker-end="url(#arrowDashed)"/>
    <path d="M295,505 L705,545" marker-end="url(#arrowDashed)"/>
  </g>
  
  <g id="interaction-labels" fill="none">
    <text transform="translate(500, 320) rotate(15)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">① SYN</text>
    <text transform="translate(500, 435) rotate(-15)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">② SYN+ACK</text>
    <text transform="translate(500, 515) rotate(5.5)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">③ ACK</text>
  </g>
  
  <g id="legend" transform="translate(30, 620)">
    <rect x="0" y="0" width="940" height="28" rx="6" fill="#eceff1"/>
    
    <line x1="25" y1="14" x2="55" y2="14" stroke="#455a64" stroke-width="2.5"/>
    <text x="65" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">状态转换</text>
    
    <line x1="170" y1="14" x2="200" y2="14" stroke="#7c4dff" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="210" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">报文交互</text>
    
    <line x1="320" y1="14" x2="350" y2="14" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="360" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">异常/超时</text>
    
    <rect x="470" y="5" width="18" height="18" rx="4" fill="url(#stateClosed)"/>
    <text x="495" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">关闭</text>
    
    <rect x="555" y="5" width="18" height="18" rx="4" fill="url(#stateListen)"/>
    <text x="580" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">监听</text>
    
    <rect x="645" y="5" width="18" height="18" rx="4" fill="url(#stateSyn)"/>
    <text x="670" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">同步中</text>
    
    <rect x="750" y="5" width="18" height="18" rx="4" fill="url(#stateEstab)"/>
    <text x="775" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">已建立</text>
  </g>
</svg>