<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#546E7A"/></marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#546E7A"/><stop offset="100%" stop-color="#37474F"/></linearGradient>
    <linearGradient id="g_hadoop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E88E5"/><stop offset="100%" stop-color="#1565C0"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F57C00"/><stop offset="100%" stop-color="#E65100"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#43A047"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7B1FA2"/><stop offset="100%" stop-color="#6A1B9A"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="1080" height="610" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#263238">核心技术对比：Hadoop vs Spark vs Flink vs 云原生</text>

  <!-- Column Headers -->
  <rect x="70" y="75" width="180" height="38" rx="6" fill="url(#g1)" filter="url(#s1)"/>
  <text x="160" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">对比维度</text>

  <rect x="265" y="75" width="180" height="38" rx="6" fill="url(#g_hadoop)" filter="url(#s1)"/>
  <text x="355" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Hadoop MapReduce</text>

  <rect x="460" y="75" width="180" height="38" rx="6" fill="url(#g2)" filter="url(#s1)"/>
  <text x="550" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Apache Spark</text>

  <rect x="655" y="75" width="180" height="38" rx="6" fill="url(#g3)" filter="url(#s1)"/>
  <text x="745" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Apache Flink</text>

  <rect x="850" y="75" width="180" height="38" rx="6" fill="url(#g4)" filter="url(#s1)"/>
  <text x="940" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">云原生平台</text>

  <!-- Row 1: 处理模型 -->
  <rect x="70" y="123" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">处理模型</text>
  <text x="160" y="161" text-anchor="middle" font-size="9" fill="#78909C">Processing Model</text>

  <rect x="265" y="123" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="145" text-anchor="middle" font-size="11" fill="#455A64">纯批处理</text>
  <text x="355" y="161" text-anchor="middle" font-size="9" fill="#999">Map → Shuffle → Reduce</text>

  <rect x="460" y="123" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="145" text-anchor="middle" font-size="11" fill="#455A64">批 + 微批流处理</text>
  <text x="550" y="161" text-anchor="middle" font-size="9" fill="#999">DAG + 内存计算</text>

  <rect x="655" y="123" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="145" text-anchor="middle" font-size="11" fill="#455A64">流处理优先</text>
  <text x="745" y="161" text-anchor="middle" font-size="9" fill="#999">批是流的特例</text>

  <rect x="850" y="123" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="145" text-anchor="middle" font-size="11" fill="#455A64">容器化部署</text>
  <text x="940" y="161" text-anchor="middle" font-size="9" fill="#999">K8s 弹性编排</text>

  <!-- Row 2: 延迟水平 -->
  <rect x="70" y="183" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">延迟水平</text>
  <text x="160" y="221" text-anchor="middle" font-size="9" fill="#78909C">Latency</text>

  <rect x="265" y="183" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="205" text-anchor="middle" font-size="11" fill="#E53935" font-weight="bold">分钟 ~ 小时级</text>
  <text x="355" y="221" text-anchor="middle" font-size="9" fill="#999">高延迟</text>

  <rect x="460" y="183" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="205" text-anchor="middle" font-size="11" fill="#F57C00" font-weight="bold">秒级</text>
  <text x="550" y="221" text-anchor="middle" font-size="9" fill="#999">中等延迟</text>

  <rect x="655" y="183" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="205" text-anchor="middle" font-size="11" fill="#43A047" font-weight="bold">毫秒级</text>
  <text x="745" y="221" text-anchor="middle" font-size="9" fill="#999">低延迟</text>

  <rect x="850" y="183" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="205" text-anchor="middle" font-size="11" fill="#7B1FA2" font-weight="bold">依赖计算框架</text>
  <text x="940" y="221" text-anchor="middle" font-size="9" fill="#999">弹性调度</text>

  <!-- Row 3: 内存管理 -->
  <rect x="70" y="243" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">内存管理</text>
  <text x="160" y="281" text-anchor="middle" font-size="9" fill="#78909C">Memory</text>

  <rect x="265" y="243" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="265" text-anchor="middle" font-size="11" fill="#455A64">磁盘 I/O 为主</text>
  <text x="355" y="281" text-anchor="middle" font-size="9" fill="#999">中间结果落盘</text>

  <rect x="460" y="243" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="265" text-anchor="middle" font-size="11" fill="#455A64">内存优先</text>
  <text x="550" y="281" text-anchor="middle" font-size="9" fill="#999">RDD 缓存</text>

  <rect x="655" y="243" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="265" text-anchor="middle" font-size="11" fill="#455A64">内存 + 磁盘混合</text>
  <text x="745" y="281" text-anchor="middle" font-size="9" fill="#999">托管状态</text>

  <rect x="850" y="243" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="265" text-anchor="middle" font-size="11" fill="#455A64">容器资源隔离</text>
  <text x="940" y="281" text-anchor="middle" font-size="9" fill="#999">按需分配</text>

  <!-- Row 4: 容错机制 -->
  <rect x="70" y="303" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">容错机制</text>
  <text x="160" y="341" text-anchor="middle" font-size="9" fill="#78909C">Fault Tolerance</text>

  <rect x="265" y="303" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="325" text-anchor="middle" font-size="11" fill="#455A64">任务重跑</text>
  <text x="355" y="341" text-anchor="middle" font-size="9" fill="#999">数据复制 + 重执行</text>

  <rect x="460" y="303" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="325" text-anchor="middle" font-size="11" fill="#455A64">RDD 血缘追溯</text>
  <text x="550" y="341" text-anchor="middle" font-size="9" fill="#999">Lineage 重建</text>

  <rect x="655" y="303" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="325" text-anchor="middle" font-size="11" fill="#455A64">分布式快照</text>
  <text x="745" y="341" text-anchor="middle" font-size="9" fill="#999">Checkpoint 屏障</text>

  <rect x="850" y="303" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="325" text-anchor="middle" font-size="11" fill="#455A64">容器重启</text>
  <text x="940" y="341" text-anchor="middle" font-size="9" fill="#999">Pod 自动恢复</text>

  <!-- Row 5: 适用场景 -->
  <rect x="70" y="363" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">适用场景</text>
  <text x="160" y="401" text-anchor="middle" font-size="9" fill="#78909C">Use Cases</text>

  <rect x="265" y="363" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="385" text-anchor="middle" font-size="10" fill="#455A64">日志分析 / ETL</text>
  <text x="355" y="401" text-anchor="middle" font-size="10" fill="#455A64">历史数据处理</text>

  <rect x="460" y="363" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="385" text-anchor="middle" font-size="10" fill="#455A64">迭代算法 / ML</text>
  <text x="550" y="401" text-anchor="middle" font-size="10" fill="#455A64">交互式分析</text>

  <rect x="655" y="363" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="385" text-anchor="middle" font-size="10" fill="#455A64">实时风控 / CEP</text>
  <text x="745" y="401" text-anchor="middle" font-size="10" fill="#455A64">流批一体数仓</text>

  <rect x="850" y="363" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="385" text-anchor="middle" font-size="10" fill="#455A64">弹性工作负载</text>
  <text x="940" y="401" text-anchor="middle" font-size="10" fill="#455A64">多云部署</text>

  <!-- Row 6: 生态成熟度 -->
  <rect x="70" y="423" width="180" height="50" rx="4" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">生态成熟度</text>
  <text x="160" y="461" text-anchor="middle" font-size="9" fill="#78909C">Ecosystem</text>

  <rect x="265" y="423" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="355" y="445" text-anchor="middle" font-size="11" fill="#455A64">非常成熟</text>
  <text x="355" y="461" text-anchor="middle" font-size="9" fill="#999">但逐步被替代</text>

  <rect x="460" y="423" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="550" y="445" text-anchor="middle" font-size="11" fill="#455A64">成熟且活跃</text>
  <text x="550" y="461" text-anchor="middle" font-size="9" fill="#999">当前主流</text>

  <rect x="655" y="423" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="745" y="445" text-anchor="middle" font-size="11" fill="#455A64">快速成长</text>
  <text x="745" y="461" text-anchor="middle" font-size="9" fill="#999">实时场景首选</text>

  <rect x="850" y="423" width="180" height="50" rx="4" fill="white" stroke="#CFD8DC" stroke-width="1"/>
  <text x="940" y="445" text-anchor="middle" font-size="11" fill="#455A64">快速发展</text>
  <text x="940" y="461" text-anchor="middle" font-size="9" fill="#999">未来方向</text>

  <!-- ===== 性能对比（完全重构） ===== -->
  <rect x="70" y="490" width="960" height="115" rx="6" fill="white" stroke="#CFD8DC" stroke-width="1"/>

  <!-- Section title bar -->
  <rect x="70" y="490" width="960" height="24" rx="6" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
  <rect x="70" y="508" width="960" height="6" fill="#ECEFF1"/>
  <text x="550" y="506" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474F">性能对比（相对 Hadoop MapReduce 基准）</text>

  <!-- Sub-header row -->
  <line x1="70" y1="514" x2="1030" y2="514" stroke="#CFD8DC" stroke-width="1"/>
  <text x="160" y="527" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474F">对比维度</text>
  <text x="355" y="527" text-anchor="middle" font-size="10" fill="#1565C0">Hadoop</text>
  <text x="550" y="527" text-anchor="middle" font-size="10" fill="#F57C00">Spark</text>
  <text x="745" y="527" text-anchor="middle" font-size="10" fill="#43A047">Flink</text>
  <text x="940" y="527" text-anchor="middle" font-size="10" fill="#7B1FA2">云原生</text>
  <line x1="70" y1="532" x2="1030" y2="532" stroke="#CFD8DC" stroke-width="1"/>

  <!-- Row 1: 批处理吞吐量 -->
  <rect x="71" y="532" width="958" height="24" fill="#FAFAFA"/>
  <text x="160" y="548" text-anchor="middle" font-size="10" fill="#455A64">批处理吞吐量</text>
  <text x="355" y="548" text-anchor="middle" font-size="10" fill="#1565C0">1x（基准）</text>
  <text x="550" y="548" text-anchor="middle" font-size="10" fill="#F57C00" font-weight="bold">10-30x</text>
  <text x="745" y="548" text-anchor="middle" font-size="10" fill="#43A047" font-weight="bold">8-15x</text>
  <text x="940" y="548" text-anchor="middle" font-size="10" fill="#7B1FA2">弹性伸缩</text>

  <!-- Row 2: 实时处理延迟 -->
  <line x1="70" y1="556" x2="1030" y2="556" stroke="#CFD8DC" stroke-width="1"/>
  <rect x="71" y="556" width="958" height="24" fill="#FAFAFA"/>
  <text x="160" y="572" text-anchor="middle" font-size="10" fill="#455A64">实时处理延迟</text>
  <text x="355" y="572" text-anchor="middle" font-size="10" fill="#999">不支持</text>
  <text x="550" y="572" text-anchor="middle" font-size="10" fill="#F57C00">秒级（微批）</text>
  <text x="745" y="572" text-anchor="middle" font-size="10" fill="#43A047" font-weight="bold">毫秒级（原生流）</text>
  <text x="940" y="572" text-anchor="middle" font-size="10" fill="#7B1FA2">依赖计算框架</text>

  <!-- Row 3: 迭代计算加速比 -->
  <line x1="70" y1="580" x2="1030" y2="580" stroke="#CFD8DC" stroke-width="1"/>
  <rect x="71" y="580" width="958" height="24" fill="white"/>
  <text x="160" y="596" text-anchor="middle" font-size="10" fill="#455A64">迭代计算加速比</text>
  <text x="355" y="596" text-anchor="middle" font-size="10" fill="#999">不支持</text>
  <text x="550" y="596" text-anchor="middle" font-size="10" fill="#F57C00" font-weight="bold">100x（内存缓存）</text>
  <text x="745" y="596" text-anchor="middle" font-size="10" fill="#43A047" font-weight="bold">50-80x（状态管理）</text>
  <text x="940" y="596" text-anchor="middle" font-size="10" fill="#7B1FA2">按需分配</text>
</svg>