  <text x="494" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">35</text>
  <text x="512" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">42</text>
  <text x="530" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">27</text>
  <text x="548" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">31</text>
  <text x="566" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">29</text>
  <text x="584" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">33</text>
  <text x="602" y="388" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">26</text>
