<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#546E7A"/></marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="680" height="500" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title bar -->
  <path d="M22,10 H678 Q690,10 690,22 V44 H10 V22 Q10,10 22,10Z" fill="#7B1FA2"/>
  <text x="350" y="27" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="white">ClickHouse 核心抽象：Block 与 IColumn</text>

  <!-- Block container (blue) -->
  <rect x="120" y="58" width="460" height="120" rx="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#s1)"/>
  <path d="M128,58 H572 Q580,58 580,66 V82 H120 V66 Q120,58 128,58Z" fill="#1E88E5"/>
  <text x="350" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="white">Block（数据块）</text>

  <!-- Row 1: IDataType + 列名 -->
  <!-- IDataType -->
  <rect x="140" y="92" width="200" height="36" rx="5" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="240" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1565C0">IDataType</text>

  <!-- 列名 -->
  <rect x="360" y="92" width="200" height="36" rx="5" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="460" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1565C0">列名（String）</text>

  <!-- Row 2: IColumn -->
  <rect x="250" y="136" width="200" height="36" rx="5" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="350" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1565C0">IColumn</text>

  <!-- Arrow: Block → IColumn实现 -->
  <line x1="350" y1="178" x2="350" y2="204" stroke="#546E7A" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="390" y="194" text-anchor="start" dominant-baseline="central" font-size="9" fill="#90A4AE">实现</text>

  <!-- IColumn实现 container (green) -->
  <rect x="30" y="210" width="640" height="288" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#s1)"/>
  <path d="M38,210 H662 Q670,210 670,218 V234 H30 V218 Q30,210 38,210Z" fill="#43A047"/>
  <text x="350" y="222" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="white">IColumn 实现</text>

  <!-- Row 1: 数值列 + 字符串列 -->
  <!-- 数值列 -->
  <rect x="46" y="244" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="196" y="262" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnVector&lt;T&gt;（数值列）</text>
  <text x="196" y="280" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">UInt8/16/32/64 · Int8/16/32/64 · Float32/64</text>

  <!-- 字符串列 -->
  <rect x="356" y="244" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="506" y="262" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnString / FixedString</text>
  <text x="506" y="280" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">chars + offsets 双向量 / 扁平字节数组</text>

  <!-- Row 2: 定点数 + 可空列 -->
  <!-- 定点数 -->
  <rect x="46" y="304" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="196" y="322" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnDecimal&lt;T&gt;（定点数）</text>
  <text x="196" y="340" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">Decimal32/64/128/256</text>

  <!-- 可空列 -->
  <rect x="356" y="304" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="506" y="322" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnNullable（可空列）</text>
  <text x="506" y="340" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">nested_col + null_map 双列结构</text>

  <!-- Row 3: 数组/元组/Map + 低基数/稀疏 -->
  <!-- 数组/元组/Map -->
  <rect x="46" y="364" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="196" y="382" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnArray / Tuple / Map</text>
  <text x="196" y="400" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">data + offsets / 多子列 / ≈Array&lt;Tuple&gt;</text>

  <!-- 低基数/稀疏 -->
  <rect x="356" y="364" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="506" y="382" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnLowCardinality / Sparse</text>
  <text x="506" y="400" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">字典 + 索引 / 默认值 + 异常值</text>

  <!-- Row 4: 常量列 + 特殊类型 -->
  <!-- 常量列 -->
  <rect x="46" y="424" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="196" y="442" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnConst（常量列）</text>
  <text x="196" y="460" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">仅存储 1 个值，对外表现为 N 行</text>

  <!-- 特殊类型 -->
  <rect x="356" y="424" width="300" height="52" rx="5" fill="white" stroke="#66BB6A" stroke-width="1"/>
  <text x="506" y="442" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#2E7D32">ColumnAggregateFunction / Variant</text>
  <text x="506" y="460" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">聚合中间状态 / 多态变体列</text>
</svg>