  <rect x="400" y="324" width="350" height="110" rx="8" fill="white" stroke="#A5D6A7" stroke-width="1" filter="url(#s1)"/>
  <text x="575" y="342" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#2E7D32" font-weight="600">列式：加载 age 列 → 缓存行全是目标数据</text>

  <!-- Column header -->
  <rect x="416" y="354" width="318" height="18" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="575" y="363" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#2E7D32" font-weight="bold">age</text>

