<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/>
    </filter>
    <linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#90A4AE"/>
    </marker>
    <marker id="arrowBlueR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#1E88E5"/>
    </marker>
    <marker id="arrowBlueL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6Z" fill="#1E88E5"/>
    </marker>
  </defs>

  <!-- Background: 30px uniform padding around content bounds (left=49, right=834, top=50, bottom=366) -->
  <rect x="19" y="20" width="845" height="376" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row Labels -->
  <text x="75" y="73" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#546E7A">根节点</text>
  <text x="75" y="183" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#546E7A">内部节点</text>
  <text x="75" y="303" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#546E7A">叶子节点</text>

  <!-- Root Node [30, 60]: 2 keys → 3 children -->
  <rect x="430" y="50" width="100" height="46" rx="8" fill="url(#rootGrad)" stroke="#0D47A1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="73" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="white">[30, 60]</text>

  <!-- Internal Node 1 [15]: covers keys < 30 -->
  <rect x="192" y="160" width="80" height="46" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="232" y="183" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1565C0">[15]</text>

  <!-- Internal Node 2 [45]: covers 30 ≤ keys < 60 -->
  <rect x="440" y="160" width="80" height="46" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="183" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1565C0">[45]</text>

  <!-- Internal Node 3 [75]: covers keys ≥ 60 -->
  <rect x="688" y="160" width="80" height="46" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="728" y="183" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1565C0">[75]</text>

  <!-- Leaf Node 1 [1~14]: keys < 15 -->
  <rect x="126" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[1~14]</text>

  <!-- Leaf Node 2 [15~29]: 15 ≤ keys < 30 -->
  <rect x="250" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="294" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[15~29]</text>

  <!-- Leaf Node 3 [30~44]: 30 ≤ keys < 45 -->
  <rect x="374" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="418" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[30~44]</text>

  <!-- Leaf Node 4 [45~59]: 45 ≤ keys < 60 -->
  <rect x="498" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="542" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[45~59]</text>

  <!-- Leaf Node 5 [60~74]: 60 ≤ keys < 75 -->
  <rect x="622" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="666" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[60~74]</text>

  <!-- Leaf Node 6 [75~99]: keys ≥ 75 -->
  <rect x="746" y="280" width="88" height="46" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="303" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2E7D32">[75~99]</text>

  <!-- Connection Lines: Root → Internal Nodes -->
  <line x1="480" y1="96" x2="232" y2="160" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="480" y1="96" x2="480" y2="160" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="480" y1="96" x2="728" y2="160" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Range labels on root connections -->
  <text x="325" y="118" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">&lt;30</text>
  <text x="500" y="130" text-anchor="start" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">[30,60)</text>
  <text x="635" y="118" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">≥60</text>

  <!-- Connection Lines: Internal Node 1 → Leaf Nodes 1,2 -->
  <line x1="232" y1="206" x2="170" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="232" y1="206" x2="294" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Range labels on Internal Node 1 connections (inherited constraint: <30) -->
  <text x="185" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">&lt;15</text>
  <text x="278" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">[15,30)</text>

  <!-- Connection Lines: Internal Node 2 → Leaf Nodes 3,4 -->
  <line x1="480" y1="206" x2="418" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="480" y1="206" x2="542" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Range labels on Internal Node 2 connections (inherited constraint: [30,60)) -->
  <text x="433" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">[30,45)</text>
  <text x="526" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">[45,60)</text>

  <!-- Connection Lines: Internal Node 3 → Leaf Nodes 5,6 -->
  <line x1="728" y1="206" x2="666" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="728" y1="206" x2="790" y2="280" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Range labels on Internal Node 3 connections (inherited constraint: ≥60) -->
  <text x="681" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">[60,75)</text>
  <text x="774" y="233" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#90A4AE" font-style="italic">≥75</text>

  <!-- Bidirectional Arrows between Leaf Nodes (Double-Linked List) -->
  <line x1="214" y1="303" x2="250" y2="303" stroke="#1E88E5" stroke-width="1.5" marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlueR)"/>
  <line x1="338" y1="303" x2="374" y2="303" stroke="#1E88E5" stroke-width="1.5" marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlueR)"/>
  <line x1="462" y1="303" x2="498" y2="303" stroke="#1E88E5" stroke-width="1.5" marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlueR)"/>
  <line x1="586" y1="303" x2="622" y2="303" stroke="#1E88E5" stroke-width="1.5" marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlueR)"/>
  <line x1="710" y1="303" x2="746" y2="303" stroke="#1E88E5" stroke-width="1.5" marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlueR)"/>

  <!-- Bidirectional Linked List Annotation -->
  <text x="480" y="360" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#78909C">←─── 双向链表连接 ───→</text>
</svg>