<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="qpsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ccGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb8c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arrowCore" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546e7a"/>
    </marker>
    <marker id="arrowRes" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c62828"/>
    </marker>
  </defs>
  
  <rect width="900" height="650" fill="url(#bgGrad)"/>
  
  <rect x="200" y="100" width="500" height="350" rx="20" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="450" y="135" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565c0">核心关系</text>
  
  <g id="rt-node">
    <rect x="220" y="170" width="150" height="70" rx="12" fill="url(#rtGrad)" filter="url(#shadowLight)"/>
    <text x="295" y="200" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="white">RT</text>
    <text x="295" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="white">响应时间</text>
  </g>
  
  <g id="cc-node">
    <rect x="530" y="170" width="150" height="70" rx="12" fill="url(#ccGrad)" filter="url(#shadowLight)"/>
    <text x="605" y="200" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="white">并发数</text>
    <text x="605" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="white">Concurrency</text>
  </g>
  
  <g id="qps-node">
    <rect x="375" y="330" width="150" height="70" rx="12" fill="url(#qpsGrad)" filter="url(#shadowLight)"/>
    <text x="450" y="360" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="white">QPS</text>
    <text x="450" y="385" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="white">吞吐量</text>
  </g>
  
  <g id="core-relations" fill="none" stroke-width="2">
    <path d="M295,240 L400,330" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <path d="M400,330 L295,240" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <text x="255" y="285" font-family="Consolas, monospace" font-size="11" fill="#37474f">RT ↑ → QPS ↓</text>
    
    <path d="M605,240 L500,330" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <path d="M500,330 L605,240" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <text x="571" y="285" font-family="Consolas, monospace" font-size="11" fill="#37474f">并发数 = QPS × RT</text>
    
    <path d="M370,205 L530,205" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <path d="M530,205 L370,205" stroke="#546e7a" marker-end="url(#arrowCore)"/>
    <text x="400" y="195" font-family="Consolas, monospace" font-size="11" fill="#37474f">QPS = 并发数 / RT</text>
  </g>
  
  <text x="450" y="500" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#c62828">资源约束</text>
  
  <g id="resource-nodes">
    <rect x="80" y="530" width="130" height="55" rx="10" fill="url(#resGrad)" filter="url(#shadowLight)"/>
    <text x="145" y="555" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">CPU利用率</text>
    <text x="145" y="575" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="white">资源瓶颈</text>
    
    <rect x="250" y="530" width="130" height="55" rx="10" fill="url(#resGrad)" filter="url(#shadowLight)"/>
    <text x="315" y="555" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">内存使用率</text>
    <text x="315" y="575" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="white">资源瓶颈</text>
    
    <rect x="520" y="530" width="130" height="55" rx="10" fill="url(#resGrad)" filter="url(#shadowLight)"/>
    <text x="585" y="555" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">IOPS/IO等待</text>
    <text x="585" y="575" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="white">资源瓶颈</text>
    
    <rect x="690" y="530" width="130" height="55" rx="10" fill="url(#resGrad)" filter="url(#shadowLight)"/>
    <text x="755" y="555" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">网络带宽</text>
    <text x="755" y="575" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="white">资源瓶颈</text>
  </g>
  
  <g id="resource-arrows" fill="none" stroke-width="2" stroke="#c62828" stroke-dasharray="6,3">
    <path d="M145,530 Q145,480 375,380" marker-end="url(#arrowRes)"/>
    <path d="M315,530 Q315,480 400,400" marker-end="url(#arrowRes)"/>
    <path d="M585,530 Q585,480 500,400" marker-end="url(#arrowRes)"/>
    <path d="M755,530 Q755,480 525,380" marker-end="url(#arrowRes)"/>
  </g>
  
  <g id="legend" transform="translate(350, 30)">
    <rect x="0" y="0" width="200" height="55" rx="8" fill="white" fill-opacity="0.9" filter="url(#shadowLight)"/>
    <rect x="15" y="12" width="16" height="16" rx="3" fill="url(#qpsGrad)"/>
    <text x="40" y="25" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">QPS/吞吐量</text>
    <rect x="110" y="12" width="16" height="16" rx="3" fill="url(#rtGrad)"/>
    <text x="135" y="25" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">RT/响应时间</text>
    <rect x="15" y="35" width="16" height="16" rx="3" fill="url(#ccGrad)"/>
    <text x="40" y="48" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">并发数</text>
    <rect x="110" y="35" width="16" height="16" rx="3" fill="url(#resGrad)"/>
    <text x="135" y="48" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">资源约束</text>
  </g>
</svg>