<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -9 680 224" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#78909C"/></marker>
  </defs>

  <!-- Background -->
  <rect x="12" y="-1" width="656" height="207" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Medallion 架构 — 青铜 → 白银 → 黄金</text>

  <!-- ===== Bronze层 ===== -->
  <rect x="30" y="52" width="180" height="135" rx="8" fill="#FFF0E0" stroke="#BF8A63" stroke-width="1.5" filter="url(#s1)"/>
  <text x="120" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#8D6E3F" dominant-baseline="central">Bronze 层（铜牌）</text>
  <text x="120" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#BF8A63" dominant-baseline="central">原始数据</text>
  <line x1="48" y1="108" x2="192" y2="108" stroke="#BF8A63" stroke-width="0.5" opacity="0.3"/>
  <circle cx="52" cy="127" r="3" fill="#BF8A63"/>
  <text x="62" y="127" font-size="11" fill="#6D4C31" dominant-baseline="central">全量摄入</text>
  <circle cx="52" cy="147" r="3" fill="#BF8A63"/>
  <text x="62" y="147" font-size="11" fill="#6D4C31" dominant-baseline="central">仅追加写入</text>
  <circle cx="52" cy="167" r="3" fill="#BF8A63"/>
  <text x="62" y="167" font-size="11" fill="#6D4C31" dominant-baseline="central">离线存储</text>

  <!-- Arrow → -->
  <line x1="210" y1="119" x2="245" y2="119" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== Silver层 ===== -->
  <rect x="250" y="52" width="180" height="135" rx="8" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5" filter="url(#s1)"/>
  <text x="340" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#616161" dominant-baseline="central">Silver 层（银牌）</text>
  <text x="340" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#9E9E9E" dominant-baseline="central">清洗数据</text>
  <line x1="268" y1="108" x2="412" y2="108" stroke="#9E9E9E" stroke-width="0.5" opacity="0.3"/>
  <circle cx="272" cy="127" r="3" fill="#9E9E9E"/>
  <text x="282" y="127" font-size="11" fill="#555" dominant-baseline="central">去重 / 过滤</text>
  <circle cx="272" cy="147" r="3" fill="#9E9E9E"/>
  <text x="282" y="147" font-size="11" fill="#555" dominant-baseline="central">增量更新</text>
  <circle cx="272" cy="167" r="3" fill="#9E9E9E"/>
  <text x="282" y="167" font-size="11" fill="#555" dominant-baseline="central">结构优化</text>

  <!-- Arrow → -->
  <line x1="430" y1="119" x2="465" y2="119" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== Gold层 ===== -->
  <rect x="470" y="52" width="180" height="135" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5" filter="url(#s1)"/>
  <text x="560" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100" dominant-baseline="central">Gold 层（金牌）</text>
  <text x="560" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#F9A825" dominant-baseline="central">聚合数据</text>
  <line x1="488" y1="108" x2="632" y2="108" stroke="#F9A825" stroke-width="0.5" opacity="0.3"/>
  <circle cx="492" cy="127" r="3" fill="#F9A825"/>
  <text x="502" y="127" font-size="11" fill="#795548" dominant-baseline="central">增量更新</text>
  <circle cx="492" cy="147" r="3" fill="#F9A825"/>
  <text x="502" y="147" font-size="11" fill="#795548" dominant-baseline="central">业务指标</text>
  <circle cx="492" cy="167" r="3" fill="#F9A825"/>
  <text x="502" y="167" font-size="11" fill="#795548" dominant-baseline="central">面向消费</text>
</svg>