<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 570" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="headerGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="headerOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="820" height="570" rx="12" fill="#F8FAFC"/>

  <!-- ==================== primary.idx ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="20" width="760" height="130" rx="10" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
    <rect x="30" y="20" width="760" height="36" rx="10" fill="url(#headerBlue)"/>
    <rect x="30" y="46" width="760" height="10" fill="url(#headerBlue)"/>
    <circle cx="52" cy="38" r="8" fill="rgba(255,255,255,0.25)"/>
    <text x="52" y="42" text-anchor="middle" fill="white" font-size="10" font-weight="bold">idx</text>
    <text x="70" y="43" fill="white" font-size="14" font-weight="600">primary.idx — 主键索引（常驻内存）</text>
    <text x="740" y="43" text-anchor="end" fill="rgba(255,255,255,0.8)" font-size="10">每项 = 排序键首行值</text>

    <!-- Mark 0 -->
    <rect x="50" y="66" width="160" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="130" y="85" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="700">Mark 0</text>
    <text x="130" y="103" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="500">user_id = 1</text>

    <!-- Mark 1 -->
    <rect x="225" y="66" width="160" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="305" y="85" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="700">Mark 1</text>
    <text x="305" y="103" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="500">user_id = 100</text>

    <!-- Mark 2 -->
    <rect x="400" y="66" width="160" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="480" y="85" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="700">Mark 2</text>
    <text x="480" y="103" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="500">user_id = 200</text>

    <!-- Mark N -->
    <rect x="575" y="66" width="160" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="655" y="85" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="700">Mark N</text>
    <text x="655" y="103" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="500">...</text>

    <!-- 二分查找标注（容器内底部） -->
    <rect x="255" y="122" width="100" height="18" rx="9" fill="#DBEAFE"/>
    <text x="305" y="135" text-anchor="middle" fill="#1E40AF" font-size="9" font-weight="600">↑ 二分查找</text>
  </g>

  <!-- ==================== 连线: primary.idx → .mrk ==================== -->
  <line x1="305" y1="150" x2="305" y2="200" stroke="#3B82F6" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrowBlue)"/>
  <text x="318" y="180" fill="#3B82F6" font-size="9" font-weight="500">Mark 编号</text>

  <!-- ==================== user_id.mrk ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="205" width="760" height="155" rx="10" fill="white" stroke="#D1FAE5" stroke-width="1.5"/>
    <rect x="30" y="205" width="760" height="36" rx="10" fill="url(#headerGreen)"/>
    <rect x="30" y="231" width="760" height="10" fill="url(#headerGreen)"/>
    <circle cx="52" cy="223" r="8" fill="rgba(255,255,255,0.25)"/>
    <text x="52" y="227" text-anchor="middle" fill="white" font-size="10" font-weight="bold">mrk</text>
    <text x="70" y="228" fill="white" font-size="14" font-weight="600">user_id.mrk — 标记文件</text>
    <text x="740" y="228" text-anchor="end" fill="rgba(255,255,255,0.8)" font-size="10">每项记录一对偏移量</text>

    <!-- Mark 0 -->
    <rect x="50" y="251" width="160" height="58" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="130" y="270" text-anchor="middle" fill="#065F46" font-size="12" font-weight="700">Mark 0</text>
    <text x="130" y="286" text-anchor="middle" fill="#059669" font-size="10">col_offset = 0</text>
    <text x="130" y="300" text-anchor="middle" fill="#059669" font-size="10">granule_offset = 0</text>

    <!-- Mark 1 -->
    <rect x="225" y="251" width="160" height="58" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="305" y="270" text-anchor="middle" fill="#065F46" font-size="12" font-weight="700">Mark 1</text>
    <text x="305" y="286" text-anchor="middle" fill="#059669" font-size="10">col_offset = 4096</text>
    <text x="305" y="300" text-anchor="middle" fill="#059669" font-size="10">granule_offset = 8192</text>

    <!-- Mark 2 -->
    <rect x="400" y="251" width="160" height="58" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="480" y="270" text-anchor="middle" fill="#065F46" font-size="12" font-weight="700">Mark 2</text>
    <text x="480" y="286" text-anchor="middle" fill="#059669" font-size="10">col_offset = 8192</text>
    <text x="480" y="300" text-anchor="middle" fill="#059669" font-size="10">granule_offset = 16384</text>

    <!-- Mark N -->
    <rect x="575" y="251" width="160" height="58" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="655" y="270" text-anchor="middle" fill="#065F46" font-size="12" font-weight="700">Mark N</text>
    <text x="655" y="286" text-anchor="middle" fill="#059669" font-size="10">...</text>

    <!-- 偏移量说明 -->
    <rect x="50" y="318" width="710" height="30" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.8"/>
    <text x="60" y="337" fill="#065F46" font-size="10" font-weight="500">
      <tspan font-weight="700">col_offset</tspan> = Granule 在 .bin 压缩文件中的字节偏移　｜
      <tspan font-weight="700">granule_offset</tspan> = Granule 在解压块中的行偏移
    </text>
  </g>

  <!-- ==================== 连线: .mrk → .bin ==================== -->
  <line x1="305" y1="360" x2="305" y2="410" stroke="#10B981" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>
  <text x="318" y="390" fill="#10B981" font-size="9" font-weight="500">偏移量定位</text>

  <!-- ==================== user_id.bin ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="415" width="760" height="120" rx="10" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
    <rect x="30" y="415" width="760" height="36" rx="10" fill="url(#headerOrange)"/>
    <rect x="30" y="441" width="760" height="10" fill="url(#headerOrange)"/>
    <circle cx="52" cy="433" r="8" fill="rgba(255,255,255,0.25)"/>
    <text x="52" y="437" text-anchor="middle" fill="white" font-size="10" font-weight="bold">bin</text>
    <text x="70" y="438" fill="white" font-size="14" font-weight="600">user_id.bin — 列数据文件（压缩存储）</text>
    <text x="740" y="438" text-anchor="end" fill="rgba(255,255,255,0.8)" font-size="10">每 Granule = 8192 行</text>

    <!-- Granule 0 -->
    <rect x="50" y="463" width="160" height="56" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="130" y="483" text-anchor="middle" fill="#92400E" font-size="12" font-weight="700">Granule 0</text>
    <text x="130" y="503" text-anchor="middle" fill="#D97706" font-size="11">user_id: 1 ~ 99</text>

    <!-- Granule 1 -->
    <rect x="225" y="463" width="160" height="56" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="305" y="483" text-anchor="middle" fill="#92400E" font-size="12" font-weight="700">Granule 1</text>
    <text x="305" y="503" text-anchor="middle" fill="#D97706" font-size="11">user_id: 100 ~ 199</text>

    <!-- Granule 2 -->
    <rect x="400" y="463" width="160" height="56" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="480" y="483" text-anchor="middle" fill="#92400E" font-size="12" font-weight="700">Granule 2</text>
    <text x="480" y="503" text-anchor="middle" fill="#D97706" font-size="11">user_id: 200 ~ 299</text>

    <!-- Granule N -->
    <rect x="575" y="463" width="160" height="56" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="655" y="483" text-anchor="middle" fill="#92400E" font-size="12" font-weight="700">Granule N</text>
    <text x="655" y="503" text-anchor="middle" fill="#D97706" font-size="11">...</text>
  </g>

  <!-- ==================== 右侧查询流程标注 ==================== -->
  <g>
    <rect x="750" y="72" width="24" height="24" rx="12" fill="#3B82F6"/>
    <text x="762" y="83" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="700">1</text>

    <rect x="750" y="270" width="24" height="24" rx="12" fill="#10B981"/>
    <text x="762" y="281" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="700">2</text>

    <rect x="750" y="480" width="24" height="24" rx="12" fill="#F59E0B"/>
    <text x="762" y="491" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="700">3</text>
  </g>
</svg>