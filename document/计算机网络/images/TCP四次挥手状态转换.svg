<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f6f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0e9f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="passiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9f0f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateEstab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateFinWait" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateTimeWait" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateClosing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateCloseWait" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateClosed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#607d8b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000025"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arrowSolid" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455a64"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrowSimul" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e53935"/>
    </marker>
  </defs>
  
  <rect width="1000" height="720" fill="url(#bgGrad)"/>
  
  <rect x="30" y="60" width="400" height="590" rx="15" fill="url(#activeGrad)" filter="url(#shadow)"/>
  <rect x="570" y="60" width="400" height="590" rx="15" fill="url(#passiveGrad)" filter="url(#shadow)"/>
  
  <text x="230" y="38" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0">主动关闭方状态</text>
  <text x="770" y="38" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#7b1fa2">被动关闭方状态</text>
  
  <g id="active-states">
    <rect x="165" y="90" width="130" height="45" rx="10" fill="url(#stateEstab)" filter="url(#shadowLight)"/>
    <text x="230" y="120" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">ESTABLISHED</text>
    
    <rect x="165" y="175" width="130" height="45" rx="10" fill="url(#stateFinWait)" filter="url(#shadowLight)"/>
    <text x="230" y="205" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">FIN_WAIT_1</text>
    
    <rect x="165" y="290" width="130" height="45" rx="10" fill="url(#stateFinWait)" filter="url(#shadowLight)"/>
    <text x="230" y="320" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">FIN_WAIT_2</text>
    
    <rect x="50" y="370" width="130" height="45" rx="10" fill="url(#stateClosing)" filter="url(#shadowLight)"/>
    <text x="115" y="400" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">CLOSING</text>
    
    <rect x="165" y="490" width="130" height="45" rx="10" fill="url(#stateTimeWait)" filter="url(#shadowLight)"/>
    <text x="230" y="520" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">TIME_WAIT</text>
    
    <rect x="165" y="590" width="130" height="45" rx="10" fill="url(#stateClosed)" filter="url(#shadowLight)"/>
    <text x="230" y="620" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">CLOSED</text>
  </g>
  
  <g id="passive-states">
    <rect x="705" y="90" width="130" height="45" rx="10" fill="url(#stateEstab)" filter="url(#shadowLight)"/>
    <text x="770" y="120" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">ESTABLISHED</text>
    
    <rect x="705" y="230" width="130" height="45" rx="10" fill="url(#stateCloseWait)" filter="url(#shadowLight)"/>
    <text x="770" y="260" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">CLOSE_WAIT</text>
    
    <rect x="705" y="400" width="130" height="45" rx="10" fill="url(#stateFinWait)" filter="url(#shadowLight)"/>
    <text x="770" y="430" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">LAST_ACK</text>
    
    <rect x="705" y="590" width="130" height="45" rx="10" fill="url(#stateClosed)" filter="url(#shadowLight)"/>
    <text x="770" y="620" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="white">CLOSED</text>
  </g>
  
  <g id="active-transitions" fill="none" stroke-width="2.5">
    <path d="M230,135 L230,170" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">发送 FIN</text>
    
    <path d="M230,220 L230,285" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="255" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">收到 ACK</text>
    
    <path d="M230,335 L230,485" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">收到 FIN</text>
    <text x="245" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">发送 ACK</text>
    
    <path d="M230,535 L230,585" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="245" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">等待 2MSL</text>
    
    <path d="M165,197 Q115,197 115,365" stroke="#e53935" stroke-dasharray="6,3" marker-end="url(#arrowSimul)"/>
    <text x="55" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#c62828">同时关闭</text>
    <text x="55" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#c62828">收到 FIN</text>
    <text x="55" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#c62828">发送 ACK</text>
    
    <path d="M115,415 Q115,460 165,512" stroke="#e53935" stroke-dasharray="6,3" marker-end="url(#arrowSimul)"/>
    <text x="140" y="455" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#c62828">收到 ACK</text>
  </g>
  
  <g id="passive-transitions" fill="none" stroke-width="2.5">
    <path d="M770,135 L770,225" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">收到 FIN</text>
    <text x="785" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">发送 ACK</text>
    
    <path d="M770,275 L770,395" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">发送 FIN</text>
    
    <path d="M770,445 L770,585" stroke="#455a64" marker-end="url(#arrowSolid)"/>
    <text x="785" y="510" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#37474f">收到 ACK</text>
  </g>
  
  <g id="interactions" fill="none" stroke-width="2.5" stroke="#7c4dff" stroke-dasharray="8,4">
    <path d="M295,197 L705,252" marker-end="url(#arrowDashed)"/>
    <path d="M705,252 L295,312" marker-end="url(#arrowDashed)"/>
    <path d="M705,252 L295,512" marker-end="url(#arrowDashed)"/>
    <path d="M295,512 L705,612" marker-end="url(#arrowDashed)"/>
  </g>
  
  <g id="interaction-labels" fill="none">
    <text transform="translate(500, 218) rotate(8)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">① FIN</text>
    <text transform="translate(500, 275) rotate(-5)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">② ACK</text>
    <text transform="translate(500, 375) rotate(-20)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">③ FIN</text>
    <text transform="translate(500, 555) rotate(12)" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6200ea">④ ACK</text>
  </g>
  
  <g id="legend" transform="translate(30, 665)">
    <rect x="0" y="0" width="940" height="28" rx="6" fill="#eceff1"/>
    
    <line x1="25" y1="14" x2="55" y2="14" stroke="#455a64" stroke-width="2.5"/>
    <text x="65" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">状态转换</text>
    
    <line x1="170" y1="14" x2="200" y2="14" stroke="#7c4dff" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="210" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">报文交互</text>
    
    <line x1="320" y1="14" x2="350" y2="14" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="360" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">同时关闭</text>
    
    <rect x="470" y="5" width="18" height="18" rx="4" fill="url(#stateEstab)"/>
    <text x="495" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">已建立</text>
    
    <rect x="555" y="5" width="18" height="18" rx="4" fill="url(#stateFinWait)"/>
    <text x="580" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">等待中</text>
    
    <rect x="645" y="5" width="18" height="18" rx="4" fill="url(#stateTimeWait)"/>
    <text x="670" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">时间等待</text>
    
    <rect x="755" y="5" width="18" height="18" rx="4" fill="url(#stateClosed)"/>
    <text x="780" y="19" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#37474f">已关闭</text>
  </g>
</svg>