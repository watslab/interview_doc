<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 0 960 300" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#90A4AE"/></marker>
    <marker id="ahr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#E53935"/></marker>
  </defs>

  <!-- Background -->
  <rect x="15" y="20" width="920" height="256" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="475" y="42" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">MapReduce 工作流程</text>

  <!-- ===== Main Flow Boxes (uniform 130×52) ===== -->

  <!-- 输入数据 -->
  <rect x="40" y="64" width="130" height="52" rx="8" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5" filter="url(#s1)"/>
  <text x="105" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#333">输入数据</text>
  <text x="105" y="104" text-anchor="middle" font-size="10" fill="#78909C">Input Split</text>

  <!-- Map阶段 -->
  <rect x="225" y="64" width="130" height="52" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#s1)"/>
  <text x="290" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Map 阶段</text>
  <text x="290" y="104" text-anchor="middle" font-size="10" fill="#64B5F6">映射 · 键值对输出</text>

  <!-- Shuffle阶段 -->
  <rect x="410" y="64" width="130" height="52" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" filter="url(#s1)"/>
  <text x="475" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Shuffle 阶段</text>
  <text x="475" y="104" text-anchor="middle" font-size="10" fill="#FFB74D">分区 · 排序 · 合并</text>

  <!-- Reduce阶段 -->
  <rect x="595" y="64" width="130" height="52" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#s1)"/>
  <text x="660" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Reduce 阶段</text>
  <text x="660" y="104" text-anchor="middle" font-size="10" fill="#64B5F6">归约 · 聚合计算</text>

  <!-- 输出结果 -->
  <rect x="780" y="64" width="130" height="52" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="845" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#333">输出结果</text>
  <text x="845" y="104" text-anchor="middle" font-size="10" fill="#81C784">Output</text>

  <!-- ===== Forward Arrows ===== -->
  <line x1="170" y1="90" x2="225" y2="90" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="355" y1="90" x2="410" y2="90" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="540" y1="90" x2="595" y2="90" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="725" y1="90" x2="780" y2="90" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== HDFS Cylinder (centered between Map and Shuffle) ===== -->
  <g filter="url(#s1)">
    <!-- Cylinder body + bottom arc -->
    <path d="M303,182 V222 A80,10 0 0,0 463,222 V182" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <!-- Cylinder top ellipse -->
    <ellipse cx="383" cy="182" rx="80" ry="10" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
  </g>
  <text x="383" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#C62828" dominant-baseline="central">HDFS 磁盘 I/O</text>
  <text x="383" y="219" text-anchor="middle" font-size="10" fill="#EF9A9A" dominant-baseline="central">中间结果落盘</text>

  <!-- ===== 性能瓶颈 (aligned with Reduce阶段, same y as HDFS) ===== -->
  <rect x="590" y="182" width="140" height="44" rx="6" fill="#FFF8E1" stroke="#FF8F00" stroke-width="1" stroke-dasharray="4,2" filter="url(#s1)"/>
  <text x="660" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#E65100">⚠ 性能瓶颈</text>
  <text x="660" y="216" text-anchor="middle" font-size="9" fill="#FF8F00">每次Map结果必须落盘</text>

  <!-- ===== Down Arrow: Map → HDFS (right-angle path) ===== -->
  <path d="M290,116 L290,146 L340,146 L340,174" stroke="#E53935" stroke-width="1.5" fill="none" marker-end="url(#ahr)"/>
  <text x="278" y="141" text-anchor="end" font-size="10" fill="#E53935" font-weight="600" dominant-baseline="central">写入</text>

  <!-- ===== Up Arrow: HDFS → Shuffle (right-angle path) ===== -->
  <path d="M426,174 L426,146 L475,146 L475,116" stroke="#E53935" stroke-width="1.5" fill="none" marker-end="url(#ahr)"/>
  <text x="492" y="141" text-anchor="start" font-size="10" fill="#E53935" font-weight="600" dominant-baseline="central">读取</text>

  <!-- ===== Return Loop: Output → Input (multi-job chaining) ===== -->
  <path d="M845,116 L845,265 L105,265 L105,116" stroke="#E53935" stroke-width="1.2" fill="none" stroke-dasharray="6,3" marker-end="url(#ahr)"/>
  <text x="475" y="257" text-anchor="middle" font-size="10" fill="#E53935">多作业串联：中间结果写入HDFS磁盘，输出成为下一作业输入</text>
</svg>