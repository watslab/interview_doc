<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#43A047"/></marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="660" height="400" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title bar -->
  <path d="M22,10 H658 Q670,10 670,22 V44 H10 V22 Q10,10 22,10Z" fill="#43A047"/>
  <text x="340" y="27" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="white">向量化执行模型（Vectorized Execution Model）</text>

  <!-- SQL example -->
  <rect x="100" y="52" width="480" height="20" rx="4" fill="#E8F5E9"/>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#2E7D32" font-family="Consolas,monospace">SELECT sum(price) FROM orders WHERE category = 'Electronics'</text>

  <!-- Scan -->
  <rect x="120" y="82" width="200" height="44" rx="6" fill="white" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="220" y="98" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#2E7D32">Scan</text>
  <text x="220" y="114" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">next() → Block（8192 行）</text>

  <!-- Arrow Scan→Filter -->
  <line x1="220" y1="126" x2="220" y2="150" stroke="#43A047" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Data annotation: Scan output -->
  <line x1="324" y1="140" x2="380" y2="140" stroke="#C8E6C9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="384" y="128" width="260" height="24" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="514" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#2E7D32" font-family="Consolas,monospace">Block { category[], price[] }</text>

  <!-- Filter -->
  <rect x="120" y="154" width="200" height="44" rx="6" fill="white" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="220" y="170" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#2E7D32">Filter</text>
  <text x="220" y="186" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">对整列生成位图</text>

  <!-- Arrow Filter→Aggregate -->
  <line x1="220" y1="198" x2="220" y2="222" stroke="#43A047" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Data annotation: Filter output -->
  <line x1="324" y1="212" x2="380" y2="212" stroke="#C8E6C9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="384" y="200" width="260" height="24" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="514" y="212" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#2E7D32" font-family="Consolas,monospace">mask = [1,0,1,...] 位图筛选</text>

  <!-- Aggregate -->
  <rect x="120" y="226" width="200" height="44" rx="6" fill="white" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="220" y="242" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#2E7D32">Aggregate</text>
  <text x="220" y="258" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">批量聚合</text>

  <!-- Arrow Aggregate→Result -->
  <line x1="220" y1="270" x2="220" y2="294" stroke="#43A047" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Data annotation: Aggregate output -->
  <line x1="324" y1="284" x2="380" y2="284" stroke="#C8E6C9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="384" y="272" width="260" height="24" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="514" y="284" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#2E7D32" font-family="Consolas,monospace">根据 mask 批量求和 price[]</text>

  <!-- Result -->
  <rect x="120" y="298" width="200" height="44" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="220" y="314" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#2E7D32">Result</text>
  <text x="220" y="330" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#66BB6A">最终聚合结果</text>

  <!-- Block visualization (left side) -->
  <rect x="30" y="82" width="70" height="260" rx="6" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="65" y="212" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#2E7D32" font-weight="bold" transform="rotate(-90, 65, 212)">Block（8192 行）</text>

  <!-- Key difference badge -->
  <rect x="120" y="358" width="440" height="36" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="140" y="376" text-anchor="start" dominant-baseline="central" font-size="11" fill="#E65100" font-weight="bold">关键差异：</text>
  <text x="218" y="376" text-anchor="start" dominant-baseline="central" font-size="11" fill="#F57C00">每个算子一次处理整个 Block，而非逐行调用 next()</text>
</svg>