<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="520" height="420">
  <defs>
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bbdefb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="acceptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8e6c9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a5d6a7" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe0b2" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546e7a"/>
    </marker>
    <marker id="startArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e65100"/>
    </marker>
  </defs>

  <rect x="5" y="5" width="510" height="410" rx="12" fill="#fafafa" filter="url(#shadow)"/>
  <text x="260" y="30" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#37474f">FST 结构</text>
  <text x="260" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#78909c">词典词项：cat, car, bat, bar</text>

  <line x1="60" y1="100" x2="145" y2="100" stroke="#e65100" stroke-width="2" marker-end="url(#startArrow)"/>

  <circle cx="170" cy="100" r="18" fill="url(#rootGrad)" filter="url(#shadow)"/>
  <text x="170" y="105" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">q0</text>

  <circle cx="200" cy="190" r="18" fill="url(#stateGrad)" filter="url(#shadow)"/>
  <text x="200" y="195" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#1565c0">q1</text>

  <circle cx="200" cy="270" r="18" fill="url(#stateGrad)" filter="url(#shadow)"/>
  <text x="200" y="275" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#1565c0">q2</text>

  <circle cx="140" cy="350" r="18" fill="url(#acceptGrad)" filter="url(#shadow)"/>
  <circle cx="140" cy="350" r="14" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="140" y="355" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#2e7d32">q3</text>

  <circle cx="260" cy="350" r="18" fill="url(#acceptGrad)" filter="url(#shadow)"/>
  <circle cx="260" cy="350" r="14" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="260" y="355" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#2e7d32">q4</text>

  <g stroke="#546e7a" stroke-width="1.8" fill="none">
    <path d="M180,117 Q190,150 198,172" marker-end="url(#arrow)"/>
    <path d="M200,208 L200,252" marker-end="url(#arrow)"/>
    <path d="M188,285 L155,332" marker-end="url(#arrow)"/>
    <path d="M212,285 L245,332" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="#d32f2f">
    <text x="195" y="139">c,b</text>
    <text x="210" y="228">a</text>
    <text x="160" y="310">t</text>
    <text x="234" y="310">r</text>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#546e7a">
    <text x="240" y="195">后缀共享：cat/car 和 bat/bar</text>
    <text x="240" y="207">的后续路径完全相同，合并为 q1</text>
    <text x="240" y="275">后缀共享：at/ar 被四个词项共享</text>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#78909c">
    <text x="90" y="390">最小化：合并等价状态，使状态数最少。q1 是最小化的关键节点</text>
  </g>

  <g transform="translate(370, 70)">
    <rect x="0" y="0" width="120" height="110" rx="6" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" font-weight="bold" fill="#616161">图例</text>

    <circle cx="18" cy="34" r="8" fill="url(#rootGrad)"/>
    <text x="32" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#757575">起始状态</text>

    <circle cx="18" cy="54" r="8" fill="url(#stateGrad)"/>
    <text x="32" y="58" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#757575">中间状态</text>

    <circle cx="18" cy="74" r="8" fill="url(#acceptGrad)"/>
    <circle cx="18" cy="74" r="6" fill="none" stroke="#2e7d32" stroke-width="1"/>
    <text x="32" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#757575">接受状态</text>

    <line x1="8" y1="98" x2="28" y2="98" stroke="#546e7a" stroke-width="1.8"/>
    <text x="18" y="95" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="bold" fill="#d32f2f">a</text>
    <text x="36" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#757575">边标签</text>
  </g>
</svg>