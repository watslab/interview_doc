<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 0 760 215" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#78909C"/></marker>
  </defs>

  <!-- Background -->
  <rect x="5" y="8" width="740" height="200" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="375" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">湖仓一体（Lakehouse）— 存储统一，流批融合</text>

  <!-- ===== 数据源 ===== -->
  <rect x="20" y="72" width="90" height="50" rx="8" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5" filter="url(#s1)"/>
  <text x="65" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">数据源</text>
  <text x="65" y="107" text-anchor="middle" font-size="10" fill="#78909C" dominant-baseline="central">Data Source</text>

  <!-- ===== Flink/Spark ===== -->
  <rect x="155" y="72" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#s1)"/>
  <text x="215" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">Flink / Spark</text>
  <text x="215" y="107" text-anchor="middle" font-size="10" fill="#64B5F6" dominant-baseline="central">流批一体计算</text>

  <!-- ===== 湖仓统一存储 ===== -->
  <rect x="320" y="72" width="130" height="50" rx="8" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1.5" filter="url(#s1)"/>
  <text x="385" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">湖仓统一存储</text>
  <text x="385" y="107" text-anchor="middle" font-size="10" fill="#9575CD" dominant-baseline="central">Iceberg / Hudi / Delta</text>

  <!-- ===== OLAP引擎 ===== -->
  <rect x="495" y="72" width="100" height="50" rx="8" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#s1)"/>
  <text x="545" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">OLAP 引擎</text>
  <text x="545" y="107" text-anchor="middle" font-size="10" fill="#4DB6AC" dominant-baseline="central">Presto / Doris</text>

  <!-- ===== 服务层 ===== -->
  <rect x="640" y="72" width="90" height="50" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="685" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">服务层</text>
  <text x="685" y="107" text-anchor="middle" font-size="10" fill="#81C784" dominant-baseline="central">数据服务</text>

  <!-- ===== Forward Arrows ===== -->
  <line x1="110" y1="97" x2="155" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="275" y1="97" x2="320" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="450" y1="97" x2="495" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="595" y1="97" x2="640" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== Bottom Annotation ===== -->
  <line x1="385" y1="175" x2="385" y2="122" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#ah)"/>
  <text x="385" y="188" text-anchor="middle" font-size="10" fill="#5E35B1" dominant-baseline="central">ACID 事务 · Upsert · Time Travel · Schema Evolution</text>
</svg>