<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="postingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546e7a"/>
    </marker>
  </defs>
  
  <rect x="10" y="10" width="680" height="260" rx="10" fill="#fafafa" filter="url(#shadow)"/>
  <text x="350" y="35" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#37474f">倒排索引结构</text>
  
  <rect x="30" y="50" width="180" height="200" rx="8" fill="url(#termGrad)" filter="url(#shadow)"/>
  <rect x="30" y="50" width="180" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="120" y="73" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Term Dictionary</text>
  <text x="120" y="95" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#1565c0">（词典）</text>
  
  <g font-family="Consolas, monospace" font-size="12">
    <rect x="80" y="115" width="80" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="120" y="134" text-anchor="middle" fill="#37474f">apple</text>
    
    <rect x="80" y="155" width="80" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="120" y="174" text-anchor="middle" fill="#37474f">banana</text>
    
    <rect x="80" y="195" width="80" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="120" y="214" text-anchor="middle" fill="#37474f">orange</text>
  </g>
  
  <rect x="280" y="50" width="400" height="200" rx="8" fill="url(#postingGrad)" filter="url(#shadow)"/>
  <rect x="280" y="50" width="400" height="35" rx="8" fill="url(#headerGrad)"/>
  <text x="480" y="73" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Posting List</text>
  <text x="480" y="95" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#2e7d32">（倒排列表）</text>
  
  <g font-family="Consolas, monospace" font-size="11">
    <rect x="295" y="115" width="370" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="480" y="134" text-anchor="middle" fill="#37474f">Doc1, Doc3, Doc5</text>
    
    <rect x="295" y="155" width="370" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="480" y="174" text-anchor="middle" fill="#37474f">Doc2, Doc4</text>
    
    <rect x="295" y="195" width="370" height="28" rx="4" fill="white" filter="url(#shadow)"/>
    <text x="480" y="214" text-anchor="middle" fill="#37474f">Doc1, Doc2, Doc3, Doc4, Doc5</text>
  </g>
  
  <g stroke="#546e7a" stroke-width="2" fill="none">
    <path d="M160,129 L280,129" marker-end="url(#arrow)"/>
    <path d="M160,169 L280,169" marker-end="url(#arrow)"/>
    <path d="M160,209 L280,209" marker-end="url(#arrow)"/>
  </g>
</svg>