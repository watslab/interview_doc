  <text x="660" y="418" text-anchor="start" dominant-baseline="central" font-size="9" fill="#2E7D32" font-weight="bold">= 100%</text>

  <!-- ===== Bottom Summary ===== -->
  <rect x="30" y="445" width="720" height="84" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="50" y="463" text-anchor="start" dominant-baseline="central" font-size="11" fill="#E65100" font-weight="bold">核心原理</text>
  <text x="50" y="479" text-anchor="start" dominant-baseline="central" font-size="10" fill="#F57C00">CPU 以缓存行（64 字节）为单位加载数据。</text>
  <text x="50" y="495" text-anchor="start" dominant-baseline="central" font-size="10" fill="#2E7D32">列式存储同列数据连续排列，1 次内存读取可获得 16 个 Int32 值；</text>
  <text x="50" y="511" text-anchor="start" dominant-baseline="central" font-size="10" fill="#C62828">行式存储一行跨多列，单个缓存行仅含 1 个目标值，其余被无关列占用 → 缓存利用率极低。</text>
</svg>