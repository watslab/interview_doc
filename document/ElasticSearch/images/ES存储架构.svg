<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="indexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bbdefb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="shardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e1bee7" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="luceneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c8e6c9" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="segmentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe0b2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="card1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bbdefb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="card2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c8e6c9" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="card3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce4ec" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f8bbd9" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="580" height="380" rx="15" fill="url(#indexGrad)" filter="url(#shadow)"/>
  <text x="300" y="38" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565c0">Index</text>

  <rect x="30" y="55" width="540" height="320" rx="12" fill="url(#shardGrad)" filter="url(#shadow)"/>
  <text x="300" y="78" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">Shard</text>

  <rect x="50" y="95" width="500" height="260" rx="10" fill="url(#luceneGrad)" filter="url(#shadow)"/>
  <text x="300" y="118" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Lucene Index</text>

  <rect x="70" y="135" width="460" height="200" rx="8" fill="url(#segmentGrad)" filter="url(#shadow)"/>
  <text x="300" y="158" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">Segment</text>

  <g id="data-structures">
    <rect x="85" y="175" width="130" height="145" rx="6" fill="url(#card1Grad)" filter="url(#shadowLight)"/>
    <text x="150" y="198" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">倒排索引</text>
    <line x1="100" y1="208" x2="200" y2="208" stroke="#1565c0" stroke-width="1" opacity="0.3"/>
    <text x="150" y="228" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">Term Dictionary</text>
    <text x="150" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">Posting List</text>
    <text x="150" y="262" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">FST 压缩</text>
    <rect x="100" y="280" width="100" height="28" rx="4" fill="#1565c0" opacity="0.1"/>
    <text x="150" y="300" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#1565c0">全文搜索</text>

    <rect x="235" y="175" width="130" height="145" rx="6" fill="url(#card2Grad)" filter="url(#shadowLight)"/>
    <text x="300" y="198" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Doc Values</text>
    <line x1="250" y1="208" x2="350" y2="208" stroke="#2e7d32" stroke-width="1" opacity="0.3"/>
    <text x="300" y="228" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">列式存储</text>
    <text x="300" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">DocID → Value</text>
    <text x="300" y="262" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">压缩编码</text>
    <rect x="250" y="280" width="100" height="28" rx="4" fill="#2e7d32" opacity="0.1"/>
    <text x="300" y="300" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#2e7d32">排序聚合</text>

    <rect x="385" y="175" width="130" height="145" rx="6" fill="url(#card3Grad)" filter="url(#shadowLight)"/>
    <text x="450" y="198" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2185b">BKD 树</text>
    <line x1="400" y1="208" x2="500" y2="208" stroke="#c2185b" stroke-width="1" opacity="0.3"/>
    <text x="450" y="228" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">多维空间划分</text>
    <text x="450" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">数值类型索引</text>
    <text x="450" y="262" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#37474f">地理坐标索引</text>
    <rect x="400" y="280" width="100" height="28" rx="4" fill="#c2185b" opacity="0.1"/>
    <text x="450" y="300" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#c2185b">范围查询</text>
  </g>
</svg>