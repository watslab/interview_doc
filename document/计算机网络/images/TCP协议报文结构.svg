<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="optionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeeba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#f5f7fa"/>
  
  <!-- 标题 -->
  <rect x="50" y="20" width="700" height="50" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="52" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">TCP 协议报文结构</text>
  
  <!-- 第一行：源端口 + 目的端口 -->
  <g filter="url(#shadow)">
    <rect x="50" y="85" width="350" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
    <rect x="400" y="85" width="350" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
  </g>
  <text x="225" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">源端口</text>
  <text x="225" y="128" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Source Port (16 bit)</text>
  <text x="575" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">目的端口</text>
  <text x="575" y="128" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Destination Port (16 bit)</text>
  
  <!-- 第二行：序列号 -->
  <g filter="url(#shadow)">
    <rect x="50" y="150" width="700" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
  </g>
  <text x="400" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">序列号</text>
  <text x="400" y="193" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Sequence Number (32 bit)</text>
  
  <!-- 第三行：确认号 -->
  <g filter="url(#shadow)">
    <rect x="50" y="215" width="700" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
  </g>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">确认号</text>
  <text x="400" y="258" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Acknowledgment Number (32 bit)</text>
  
  <!-- 第四行：数据偏移 + 保留位 + 控制位 + 窗口大小 -->
  <g filter="url(#shadow)">
    <rect x="50" y="280" width="88" height="70" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
    <rect x="140" y="280" width="88" height="70" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
    <!-- 控制位：6个独立小格 -->
    <rect x="230" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <rect x="292" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <rect x="354" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <rect x="416" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <rect x="478" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <rect x="540" y="280" width="60" height="70" rx="4" fill="url(#flagGrad)" stroke="#e91e63" stroke-width="1"/>
    <!-- 窗口大小 -->
    <rect x="602" y="280" width="148" height="70" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
  </g>
  
  <!-- 数据偏移标注 -->
  <text x="94" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#495057" text-anchor="middle">数据偏移</text>
  <text x="94" y="321" font-family="Arial, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">(4 bit)</text>
  <text x="94" y="338" font-family="Arial, sans-serif" font-size="8" fill="#adb5bd" text-anchor="middle">首部长度</text>
  
  <!-- 保留位标注 -->
  <text x="184" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#495057" text-anchor="middle">保留位</text>
  <text x="184" y="321" font-family="Arial, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">(6 bit)</text>
  <text x="184" y="338" font-family="Arial, sans-serif" font-size="8" fill="#adb5bd" text-anchor="middle">置0</text>
  
  <!-- 控制位标注 - 每个标志位单独标注 -->
  <text x="260" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">URG</text>
  <text x="260" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">紧急</text>
  <text x="260" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <text x="322" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">ACK</text>
  <text x="322" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">确认</text>
  <text x="322" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <text x="384" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">PSH</text>
  <text x="384" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">推送</text>
  <text x="384" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <text x="446" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">RST</text>
  <text x="446" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">重置</text>
  <text x="446" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <text x="508" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">SYN</text>
  <text x="508" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">同步</text>
  <text x="508" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <text x="570" y="303" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2185b" text-anchor="middle">FIN</text>
  <text x="570" y="318" font-family="Arial, sans-serif" font-size="8" fill="#6c757d" text-anchor="middle">结束</text>
  <text x="570" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e91e63" text-anchor="middle">(1 bit)</text>
  
  <!-- 窗口大小标注 -->
  <text x="676" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#495057" text-anchor="middle">窗口大小</text>
  <text x="676" y="321" font-family="Arial, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">(16 bit)</text>
  <text x="676" y="338" font-family="Arial, sans-serif" font-size="8" fill="#adb5bd" text-anchor="middle">流量控制</text>
  
  <!-- 第五行：检验和 + 紧急指针 -->
  <g filter="url(#shadow)">
    <rect x="50" y="360" width="350" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
    <rect x="400" y="360" width="350" height="55" rx="4" fill="url(#fieldGrad)" stroke="#dee2e6" stroke-width="1"/>
  </g>
  <text x="225" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">检验和</text>
  <text x="225" y="403" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Checksum (16 bit)</text>
  <text x="575" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">紧急指针</text>
  <text x="575" y="403" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Urgent Pointer (16 bit)</text>
  
  <!-- 选项字段（可变长度） -->
  <g filter="url(#shadow)">
    <rect x="50" y="425" width="700" height="45" rx="4" fill="url(#optionGrad)" stroke="#ffc107" stroke-width="1.5"/>
  </g>
  <text x="400" y="447" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#856404" text-anchor="middle">选项 (Options) - 可变长度，最大 40 字节</text>
  <text x="400" y="463" font-family="Arial, sans-serif" font-size="10" fill="#856404" text-anchor="middle">MSS | Window Scale | Timestamps | SACK</text>
  
  <!-- 数据部分 -->
  <g filter="url(#shadow)">
    <rect x="50" y="480" width="700" height="50" rx="4" fill="url(#dataGrad)" stroke="#28a745" stroke-width="1.5"/>
  </g>
  <text x="400" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#155724" text-anchor="middle">数据 (Data)</text>
  <text x="400" y="523" font-family="Arial, sans-serif" font-size="11" fill="#155724" text-anchor="middle">应用层数据</text>
  
  <!-- 图例（底部） -->
  <rect x="50" y="545" width="700" height="40" rx="6" fill="white" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#495057">图例：</text>
  
  <rect x="130" y="558" width="20" height="14" rx="2" fill="url(#fieldGrad)" stroke="#dee2e6"/>
  <text x="155" y="569" font-family="Arial, sans-serif" font-size="10" fill="#495057">固定首部 (20 字节)</text>
  
  <rect x="280" y="558" width="20" height="14" rx="2" fill="url(#flagGrad)" stroke="#e91e63"/>
  <text x="305" y="569" font-family="Arial, sans-serif" font-size="10" fill="#495057">控制位 (6 bit)</text>
  
  <rect x="410" y="558" width="20" height="14" rx="2" fill="url(#optionGrad)" stroke="#ffc107"/>
  <text x="435" y="569" font-family="Arial, sans-serif" font-size="10" fill="#495057">可变选项 (≤40 字节)</text>
  
  <rect x="560" y="558" width="20" height="14" rx="2" fill="url(#dataGrad)" stroke="#28a745"/>
  <text x="585" y="569" font-family="Arial, sans-serif" font-size="10" fill="#495057">数据部分</text>
</svg>