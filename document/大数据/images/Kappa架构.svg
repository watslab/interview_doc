<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -21 700 233" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="1" dy="2" flood-color="#000" flood-opacity="0.08" stdDeviation="3"/></filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#78909C"/></marker>
    <marker id="ahr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#E53935"/></marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="-1" width="660" height="193" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Kappa 架构 — 流批一体，回溯重算</text>

  <!-- ===== 数据源 ===== -->
  <rect x="30" y="72" width="100" height="50" rx="8" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5" filter="url(#s1)"/>
  <text x="80" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">数据源</text>
  <text x="80" y="107" text-anchor="middle" font-size="10" fill="#78909C" dominant-baseline="central">Data Source</text>

  <!-- ===== Kafka ===== -->
  <rect x="200" y="72" width="110" height="50" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" filter="url(#s1)"/>
  <text x="255" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">Kafka</text>
  <text x="255" y="107" text-anchor="middle" font-size="10" fill="#FFB74D" dominant-baseline="central">统一存储</text>

  <!-- ===== Flink ===== -->
  <rect x="380" y="72" width="110" height="50" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5" filter="url(#s1)"/>
  <text x="435" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">Flink</text>
  <text x="435" y="107" text-anchor="middle" font-size="10" fill="#64B5F6" dominant-baseline="central">统一流处理</text>

  <!-- ===== 服务层 ===== -->
  <rect x="550" y="72" width="100" height="50" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5" filter="url(#s1)"/>
  <text x="600" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#333" dominant-baseline="central">服务层</text>
  <text x="600" y="107" text-anchor="middle" font-size="10" fill="#81C784" dominant-baseline="central">合并查询</text>

  <!-- ===== Forward Arrows ===== -->
  <line x1="130" y1="97" x2="200" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="310" y1="97" x2="380" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="490" y1="97" x2="550" y2="97" stroke="#78909C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== Feedback Loop ===== -->
  <!-- Upward arrow from below -->
  <line x1="435" y1="158" x2="435" y2="122" stroke="#E53935" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#ahr)"/>
  <text x="435" y="170" text-anchor="middle" font-size="10" fill="#E53935" dominant-baseline="central">批处理通过回溯日志重算</text>
</svg>